<!DOCTYPE html>
<html lang="en">
<head>
  <!-- No API key needed — uses Leaflet.js + OpenStreetMap (free & open source) -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Network Platform Site Code Tool</title>
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app">
    <header class="app-header">
      <h1>Network Platform Site Code Tool</h1>
      <p class="subtitle">Click the map or enter coordinates to generate a site code</p>
    </header>

    <main class="app-body">
      <!-- Map -->
      <div id="map"></div>

      <!-- Controls -->
      <div class="controls">
        <div class="input-group">
          <label for="address">Address</label>
          <input type="text" id="address" placeholder="e.g. Sydney Opera House" />
        </div>

        <div class="button-row">
          <button id="btn-address" onclick="searchAddress()">Find Address</button>
        </div>

        <div class="divider"></div>

        <div class="input-group">
          <label for="lat">Latitude</label>
          <input type="number" id="lat" placeholder="e.g. -33.8688" step="any" />
        </div>

        <div class="input-group">
          <label for="lng">Longitude</label>
          <input type="number" id="lng" placeholder="e.g. 151.2093" step="any" />
        </div>

        <div class="button-row">
          <button id="btn-show" onclick="showOnMap()">Show on Map</button>
          <button id="btn-generate" onclick="generateSiteCode()">Generate Code</button>
        </div>

        <div class="divider"></div>

        <div class="input-group">
          <label for="site-code">Site Code (7 chars)</label>
          <div class="input-with-action">
            <input type="text" id="site-code" placeholder="e.g. r3gx2f3" maxlength="20" />
            <button class="glass-toggle" id="btn-toggle-case" onclick="toggleSiteCodeCase()" title="Toggle case">Aa</button>
          </div>
        </div>

        <div class="button-row">
          <button id="btn-decode" onclick="decodeSiteCode()">Decode Code</button>
          <button id="btn-copy" onclick="copySiteCode()">Copy Code</button>
        </div>

        <p id="feedback" class="feedback"></p>
      </div>
    </main>
  </div>

  <!-- Leaflet JS (free, no API key) -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="script.js"></script>
</body>
</html>
